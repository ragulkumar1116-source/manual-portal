<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile</title>
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <span class="logo">👤</span>
      <h2>My Profile</h2>
    </div>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="profile.html" class="active">Profile</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>
  </nav>

  <div class="container">
    <div class="profile-card">
      <h3>Personal Information</h3>
      <div class="profile-grid">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="profileName" disabled>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="profileEmail" disabled>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="profilePhone" disabled>
        </div>
        <div class="form-group">
          <label>Employee ID</label>
          <input type="text" id="profileEmployeeId" disabled>
        </div>
        <div class="form-group">
          <label>Department</label>
          <input type="text" id="profileDept" disabled>
        </div>
        <div class="form-group">
          <label>Role</label>
          <input type="text" id="profileRole" disabled>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { checkAuth, logout } from './js/auth.js'
    window.logout = logout
    
    checkAuth().then(user => {
      document.getElementById('profileName').value = user.full_name || user.user_metadata?.full_name || ''
      document.getElementById('profileEmail').value = user.email
      document.getElementById('profilePhone').value = user.phone || user.user_metadata?.phone || ''
      document.getElementById('profileEmployeeId').value = user.employee_id || ''
      document.getElementById('profileDept').value = user.department || ''
      document.getElementById('profileRole').value = user.role || 'Engineer'
    })
  </script>
</body>
</html>
