<!DOCTYPE html>
<html>
<head>
  <title>Upload Manual - Admin</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input, select { width: 100%; padding: 8px; margin-bottom: 10px; }
    button { background: #1e40af; color: white; padding: 12px; border: none; cursor: pointer; width: 100%; }
    .progress { width: 100%; height: 20px; background: #e5e7eb; margin-top: 10px; display: none; }
    .progress-bar { height: 100%; background: #10b981; width: 0%; transition: width 0.3s; }
  </style>
</head>
<body>
  <h2>📤 Upload Technical Manual</h2>
  
  <form id="uploadForm">
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="title" required placeholder="e.g., Carrier Chiller Operation Manual">
    </div>
    
    <div class="form-group">
      <label>Category</label>
      <select id="category" required>
        <option value="electrical">Electrical</option>
        <option value="mechanical">Mechanical</option>
        <option value="hvac">HVAC</option>
        <option value="safety">Safety</option>
      </select>
    </div>
    
    <div class="form-group">
      <label>Equipment Model</label>
      <input type="text" id="equipmentModel" placeholder="e.g., Carrier 30XA">
    </div>
    
    <div class="form-group">
      <label>Select PDF File</label>
      <input type="file" id="fileInput" accept=".pdf" required>
    </div>
    
    <button type="submit" id="uploadBtn">Upload to Storage</button>
    
    <div class="progress" id="progressContainer">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    
    <div id="result" style="margin-top: 20px; padding: 10px; display: none;"></div>
  </form>

  <script type="module">
  import { supabase } from './js/supabase.js'
  
  // Check if bucket exists first
  async function checkBucket() {
    try {
      const { data, error } = await supabase.storage.listBuckets()
      if (error) {
        console.error('Error listing buckets:', error)
        return
      }
      console.log('Available buckets:', data.map(b => b.name))
      
      const manualsBucket = data.find(b => b.name === 'manuals')
      if (!manualsBucket) {
        alert('❌ ERROR: Bucket "manuals" does not exist!\n\nPlease create it in Supabase Dashboard:\nStorage → New Bucket → Name: manuals')
      } else {
        console.log('✅ Bucket "manuals" found:', manualsBucket)
      }
    } catch (e) {
      console.error('Bucket check error:', e)
    }
  }
  
  // Run check on load
  checkBucket()
  
  document.getElementById('uploadForm').addEventListener('submit', async (e) => {
    e.preventDefault()
    
    const file = document.getElementById('fileInput').files[0]
    const btn = document.getElementById('uploadBtn')
    const resultDiv = document.getElementById('result')
    
    if (!file) {
      alert('Please select a file')
      return
    }
    
    console.log('File selected:', file.name, 'Size:', file.size, 'Type:', file.type)
    
    btn.disabled = true
    btn.textContent = 'Uploading...'
    resultDiv.style.display = 'block'
    resultDiv.style.background = '#dbeafe'
    resultDiv.innerHTML = 'Starting upload...'
    
    try {
      const fileExt = file.name.split('.').pop().toLowerCase()
      if (fileExt !== 'pdf') {
        throw new Error('File must be a PDF')
      }
      
      const safeName = file.name.replace(/[^a-zA-Z0-9.-]/g, '_').toLowerCase()
      const fileName = `${Date.now()}_${safeName}`
      const category = document.getElementById('category').value
      const filePath = `${category}/${fileName}`
      
      console.log('Uploading to:', `manuals/${filePath}`)
      
      // Step 1: Upload to Storage
      resultDiv.innerHTML = 'Uploading to storage...'
      
      const { data: uploadData, error: uploadError } = await supabase
        .storage
        .from('manuals')
        .upload(filePath, file, {
          cacheControl: '3600',
          upsert: false
        })
      
      if (uploadError) {
        console.error('Storage error details:', uploadError)
        throw new Error(`Storage error: ${uploadError.message || JSON.stringify(uploadError)}`)
      }
      
      console.log('Storage upload success:', uploadData)
      resultDiv.innerHTML = 'File uploaded. Saving to database...'
      
      // Step 2: Save to database
      const { data: manualData, error: dbError } = await supabase
        .from('manuals')
        .insert({
          title: document.getElementById('title').value,
          category: category,
          equipment_type: document.getElementById('equipmentModel').value,
          file_path: filePath,
          file_size: formatFileSize(file.size),
          version: '1.0',
          status: 'active'
        })
        .select()
      
      if (dbError) {
        console.error('Database error:', dbError)
        throw new Error(`Database error: ${dbError.message || JSON.stringify(dbError)}`)
      }
      
      // Success
      resultDiv.style.background = '#d1fae5'
      resultDiv.style.color = '#065f46'
      resultDiv.innerHTML = `
        <strong>✅ Upload Successful!</strong><br>
        File: ${fileName}<br>
        Database ID: ${manualData[0].id}<br>
        <a href="manuals.html" style="color: #1e40af; text-decoration: underline;">View in Library</a>
      `
      
      document.getElementById('uploadForm').reset()
      
    } catch (error) {
      console.error('Full error:', error)
      resultDiv.style.background = '#fee2e2'
      resultDiv.style.color = '#991b1b'
      resultDiv.innerHTML = `<strong>❌ Error:</strong> ${error.message || error}`
    } finally {
      btn.disabled = false
      btn.textContent = 'Upload to Storage'
    }
  })
  
  function formatFileSize(bytes) {
    if (bytes === 0) return '0 Bytes'
    const k = 1024
    const sizes = ['Bytes', 'KB', 'MB', 'GB']
    const i = Math.floor(Math.log(bytes) / Math.log(k))
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i]
  }
</script>

</body>
</html>
